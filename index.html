<!DOCTYPE html>
<html lang="pl">
<head>

<title>Mój Kolaż</title>

  .img-container { width: 100%; text-align: center; margin-bottom: 20px; }

</style>
</head>
<body>
<h1>Mój Kolaż Zdjęć</h1>

<div class="img-container">
  <img src="zdjecie1.jpg" alt="Zdjęcie 1">
  <p>Opis zdjęcia 1</p>
</div>
<div class="img-container">
  <img src="zdjecie2.jpg" alt="Zdjęcie 2">
  <p>Opis zdjęcia 2</p>
</div>
<div class="img-container">
  <img src="zdjecie3.jpg" alt="Zdjęcie 3">

</div>

</body>
</html>
